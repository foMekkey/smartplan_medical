<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0D1B2A">
    <title>غير متصل — SmartPlan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0D1B2A 0%, #0A1628 50%, #081420 100%);
            color: #E8EDF3;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .offline-wrap {
            max-width: 380px;
            animation: fadeUp 0.6s ease-out;
        }

        .offline-icon {
            width: 110px; height: 110px;
            margin: 0 auto 28px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .offline-icon svg {
            width: 44px; height: 44px;
            color: #8899AA;
            animation: pulse 3s ease-in-out infinite;
        }

        .offline-icon::after {
            content: ''; position: absolute; inset: -10px;
            border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.06);
            animation: spin 25s linear infinite;
        }

        h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; }
        p { font-size: 0.95rem; color: #8899AA; line-height: 1.7; margin-bottom: 28px; }

        .retry-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 36px;
            background: linear-gradient(135deg, #00BFA6, #00A58E);
            border: none; border-radius: 12px;
            color: #0D1B2A; font-weight: 700; font-size: 1rem;
            cursor: pointer; font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0,191,166,0.3);
        }

        .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,191,166,0.4); }

        .status {
            margin-top: 32px;
            font-size: 0.78rem; color: #5A6D80;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #FECA57;
            animation: blink 2s ease-in-out infinite;
        }

        #countdown { font-family: 'Inter', monospace; font-weight: 600; }

        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%;
            filter: blur(120px); pointer-events: none;
        }
        body::before { width: 300px; height: 300px; background: rgba(0,191,166,0.05); top: -80px; right: -80px; }
        body::after { width: 250px; height: 250px; background: rgba(33,150,243,0.04); bottom: -60px; left: -60px; }

        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    </style>
</head>
<body>
    <div class="offline-wrap">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <line x1="12" y1="20" x2="12.01" y2="20"/>
            </svg>
        </div>

        <h1>غير متصل بالإنترنت</h1>
        <p>يبدو إن الاتصال انقطع. تأكد من شبكة الإنترنت وحاول تاني.</p>

        <button class="retry-btn" onclick="window.location.reload()">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            حاول تاني
        </button>

        <div class="status">
            <span class="status-dot"></span>
            في انتظار الاتصال... <span id="countdown"></span>
        </div>
    </div>

    <script>
        // Auto-reload when back online
        window.addEventListener('online', () => location.reload());

        // Auto-retry countdown
        let seconds = 15;
        const cd = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            if (cd) cd.textContent = `(${seconds}s)`;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
